[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/api/*"
  to = "https://mavoix.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/aidant-alerte"
  to = "https://mavoix.onrender.com/aidant-alerte"
  status = 200
  force = true

[[redirects]]
  from = "/aidant-alarm-default.mp3"
  to = "https://mavoix.onrender.com/aidant-alarm-default.mp3"
  status = 200
  force = true

[[redirects]]
  from = "/ma-voix-update.json"
  to = "https://mavoix.onrender.com/ma-voix-update.json"
  status = 200
  force = true

[[redirects]]
  from = "/assets/index-B_8JwamZ.js"
  to = "/assets/index-B7UyqFx1.js"
  status = 200
  force = true

[[redirects]]
  from = "/assets/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
