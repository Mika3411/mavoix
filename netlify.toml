[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/ma-voix.apk"
  [headers.values]
    Content-Type = "application/vnd.android.package-archive"
    Content-Disposition = "attachment; filename=\"ma-voix.apk\""
    Cache-Control = "no-store"

[[headers]]
  for = "/ma-voix-aidant.apk"
  [headers.values]
    Content-Type = "application/vnd.android.package-archive"
    Content-Disposition = "attachment; filename=\"ma-voix-aidant.apk\""
    Cache-Control = "no-store"

[[headers]]
  for = "/ma-voix-aidant-s24-v1.1.1.apk"
  [headers.values]
    Content-Type = "application/vnd.android.package-archive"
    Content-Disposition = "attachment; filename=\"ma-voix-aidant-s24-v1.1.1.apk\""
    Cache-Control = "no-store"

[[redirects]]
  from = "/api/*"
  to = "https://mavoix.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/aidant-alerte"
  to = "https://mavoix.onrender.com/aidant-alerte"
  status = 200
  force = true

